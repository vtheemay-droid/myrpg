<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Fichas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --hud: #00c8ff;
    --hud-dim: #004d61;
    --hud-glow: rgba(0,200,255,0.25);
    --bg: #090c10;
    --panel: #0d1117;
    --panel2: #111820;
    --border: #1a2535;
    --text: #c8d6e5;
    --text-dim: #5a7080;
    --danger: #ff3d5a;
    --success: #00e57a;
    --warn: #ffb020;
  }

  /* ── HIBRICIDADE THEMES ── */
  body.humano-comum       { --hud:#c0c8d0;--hud-dim:#2a3040;--hud-glow:rgba(192,200,208,0.2); }
  body.humano-meca        { --hud:#ff7a00;--hud-dim:#3d2000;--hud-glow:rgba(255,122,0,0.25); }
  body.humano-bestial     { --hud:#5cba3c;--hud-dim:#0f2a08;--hud-glow:rgba(92,186,60,0.25); }
  body.humano-negativo    { --hud:#9b30ff;--hud-dim:#2a0060;--hud-glow:rgba(155,48,255,0.3); }
  body.humano-positivo    { --hud:#ffe600;--hud-dim:#3a3200;--hud-glow:rgba(255,230,0,0.25); }
  body.humano-perfeito    { --hud:#00f0c8;--hud-dim:#003028;--hud-glow:rgba(0,240,200,0.3); }
  body.humano-infernal    { --hud:#ff2020;--hud-dim:#3d0000;--hud-glow:rgba(255,32,32,0.3); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    transition: --hud 0.4s, --hud-dim 0.4s;
  }

  /* ────────── SCREENS ────────── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ────────── LOGIN ────────── */
  #screen-login {
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #0a1828 0%, var(--bg) 70%);
  }

  .login-box {
    background: var(--panel);
    border: 1px solid var(--hud-dim);
    border-top: 2px solid var(--hud);
    padding: 40px 48px;
    width: 100%;
    max-width: 420px;
    position: relative;
    box-shadow: 0 0 40px var(--hud-glow);
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px;
    height: 1px;
    background: var(--hud);
    box-shadow: 0 0 12px var(--hud);
  }

  .login-logo {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: var(--hud);
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 6px;
    text-shadow: 0 0 20px var(--hud);
  }

  .login-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 36px;
  }

  .login-tabs {
    display: flex;
    border: 1px solid var(--border);
    margin-bottom: 28px;
    overflow: hidden;
  }

  .login-tab {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .login-tab.active {
    background: var(--hud-dim);
    color: var(--hud);
    border-bottom: 2px solid var(--hud);
  }

  .field-group { margin-bottom: 20px; }

  .field-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: #070a0e;
    border: 1px solid var(--border);
    border-bottom: 1px solid var(--hud-dim);
    color: var(--hud);
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    letter-spacing: 6px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: center;
  }

  .field-input:focus {
    border-color: var(--hud);
    box-shadow: 0 0 0 1px var(--hud-dim), 0 0 20px var(--hud-glow);
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--hud);
    color: var(--hud);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--hud);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: 0;
  }

  .btn-primary:hover::before { transform: scaleX(1); }
  .btn-primary:hover { color: var(--bg); }
  .btn-primary span { position: relative; z-index: 1; }

  .login-error {
    color: var(--danger);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    text-align: center;
    margin-top: 14px;
    min-height: 16px;
  }

  /* ────────── MASTER PANEL ────────── */
  #screen-master {
    flex-direction: column;
  }

  .top-bar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .top-bar-logo {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 900;
    color: var(--hud);
    letter-spacing: 3px;
    text-shadow: 0 0 10px var(--hud-glow);
  }

  .top-bar-sep { width: 1px; height: 28px; background: var(--border); }

  .top-bar-role {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .top-bar-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }

  .btn-sm {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-sm:hover { border-color: var(--hud); color: var(--hud); }
  .btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }
  .btn-sm.accent {
    border-color: var(--hud);
    color: var(--hud);
    background: var(--hud-dim);
  }

  .master-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 52px);
  }

  /* sidebar */
  .sidebar {
    width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); }

  .ficha-item {
    padding: 12px 14px;
    border: 1px solid transparent;
    cursor: pointer;
    margin-bottom: 4px;
    transition: all 0.15s;
    position: relative;
  }

  .ficha-item:hover { border-color: var(--border); background: var(--panel2); }
  .ficha-item.active { border-color: var(--hud-dim); background: var(--panel2); }
  .ficha-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--hud);
  }

  .ficha-item-name {
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 3px;
  }

  .ficha-item-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .ficha-item-race {
    display: inline-block;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    padding: 2px 6px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* main content */
  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }

  .main-content::-webkit-scrollbar { width: 4px; }
  .main-content::-webkit-scrollbar-track { background: transparent; }
  .main-content::-webkit-scrollbar-thumb { background: var(--border); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-dim);
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .empty-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ────────── FICHA EDITOR ────────── */
  .ficha-editor {
    max-width: 820px;
  }

  .ficha-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 16px;
  }

  .ficha-title-block {}

  .ficha-name-display {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    font-weight: 900;
    color: var(--hud);
    text-shadow: 0 0 20px var(--hud-glow);
    margin-bottom: 4px;
  }

  .ficha-id-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 3px;
  }

  .ficha-actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* sections */
  .section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--hud-dim);
    margin-bottom: 16px;
    position: relative;
  }

  .section::before {
    content: '';
    position: absolute;
    top: -2px; left: 0; width: 40px;
    height: 2px;
    background: var(--hud);
  }

  .section-header {
    padding: 12px 18px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--hud);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .section-body { padding: 16px 18px; }

  /* form grid */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 20px;
  }

  .form-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px 20px;
  }

  .form-field {}

  .form-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: #070a0e;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--hud);
    box-shadow: 0 0 0 1px var(--hud-dim);
  }

  .form-select { cursor: pointer; }
  .form-select option { background: var(--panel); }

  .form-textarea {
    resize: vertical;
    min-height: 72px;
    font-size: 14px;
  }

  /* stats table */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .stat-cell {
    background: #070a0e;
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--hud-dim);
    text-align: center;
    padding: 10px 6px;
    position: relative;
  }

  .stat-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .stat-input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--hud);
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    outline: none;
  }

  .stat-mod {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* tags input */
  .tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    background: #070a0e;
    border: 1px solid var(--border);
    padding: 8px 10px;
    min-height: 42px;
    align-items: center;
  }

  .tag {
    background: var(--hud-dim);
    border: 1px solid var(--hud);
    color: var(--hud);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 1px;
  }

  .tag-remove {
    cursor: pointer;
    color: var(--hud);
    opacity: 0.6;
    font-size: 12px;
    line-height: 1;
  }
  .tag-remove:hover { opacity: 1; }

  .tags-input {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    outline: none;
    flex: 1;
    min-width: 80px;
  }

  /* hibrididade tab */
  .hibri-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }

  .hibri-card {
    border: 1px solid var(--border);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .hibri-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-color, var(--hud));
    transform: scaleX(0);
    transition: transform 0.2s;
  }

  .hibri-card:hover::after, .hibri-card.selected::after { transform: scaleX(1); }

  .hibri-card.selected {
    background: rgba(255,255,255,0.03);
    border-color: var(--card-color, var(--hud));
  }

  .hibri-card-name {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--card-color, var(--text));
  }

  .hibri-card-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .hibri-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--card-color, #666);
    display: inline-block;
    margin-right: 6px;
    box-shadow: 0 0 6px var(--card-color, #666);
  }

  /* ────────── PLAYER VIEW ────────── */
  #screen-player {
    background: var(--bg);
  }

  .player-layout {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .hud-bar {
    background: var(--panel);
    border: 1px solid var(--hud-dim);
    border-top: 3px solid var(--hud);
    padding: 14px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 0 30px var(--hud-glow);
    position: relative;
  }

  .hud-bar::before {
    content: '';
    position: absolute;
    top: -3px; left: 0; width: 60px;
    height: 3px;
    background: var(--hud);
    box-shadow: 0 0 10px var(--hud);
  }

  .hud-name {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    color: var(--hud);
    text-shadow: 0 0 20px var(--hud-glow);
    flex: 1;
  }

  .hud-meta {
    text-align: right;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.8;
    letter-spacing: 1px;
  }

  .hud-vita {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .vita-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    width: 36px;
    flex-shrink: 0;
  }

  .vita-bar {
    flex: 1;
    height: 8px;
    background: var(--panel2);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .vita-fill {
    height: 100%;
    background: var(--hud);
    box-shadow: 0 0 8px var(--hud);
    transition: width 0.4s;
  }

  .vita-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--hud);
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }

  .player-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--hud-dim);
    margin-bottom: 12px;
    position: relative;
  }

  .player-section::before {
    content: '';
    position: absolute;
    top: -2px; left: 0; width: 30px;
    height: 2px;
    background: var(--hud);
  }

  .player-section-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--hud);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .player-section-body { padding: 14px 16px; }

  /* player stats */
  .player-stats-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .player-stat {
    text-align: center;
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--hud-dim);
    padding: 8px 4px;
    background: #070a0e;
  }

  .player-stat-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .player-stat-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    color: var(--hud);
    font-weight: bold;
    text-shadow: 0 0 10px var(--hud-glow);
  }

  .player-stat-mod {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  /* player attr row */
  .attr-row {
    display: flex;
    justify-content: space-around;
    gap: 10px;
  }

  .attr-block {
    text-align: center;
    flex: 1;
  }

  .attr-val {
    font-family: 'Orbitron', monospace;
    font-size: 24px;
    font-weight: 900;
    color: var(--hud);
    text-shadow: 0 0 16px var(--hud-glow);
  }

  .attr-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .attr-sep {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  /* tags display */
  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag-display {
    background: var(--hud-dim);
    border: 1px solid var(--hud);
    color: var(--hud);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    letter-spacing: 1px;
  }

  /* hibrididade badge */
  .hibri-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--hud-dim);
    border: 1px solid var(--hud);
    padding: 4px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--hud);
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 0 10px var(--hud-glow);
  }

  /* player tabs */
  .player-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    gap: 2px;
    overflow-x: auto;
  }

  .player-tab {
    padding: 10px 18px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
