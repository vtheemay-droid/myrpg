<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Fichas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --hud: #00c8ff;
    --hud-dim: #004d61;
    --hud-glow: rgba(0,200,255,0.25);
    --bg: #090c10;
    --panel: #0d1117;
    --panel2: #111820;
    --border: #1a2535;
    --text: #c8d6e5;
    --text-dim: #5a7080;
    --danger: #ff3d5a;
    --success: #00e57a;
    --warn: #ffb020;
  }

  /* ── HIBRICIDADE THEMES ── */
  body.humano-comum       { --hud:#c0c8d0;--hud-dim:#2a3040;--hud-glow:rgba(192,200,208,0.2); }
  body.humano-meca        { --hud:#ff7a00;--hud-dim:#3d2000;--hud-glow:rgba(255,122,0,0.25); }
  body.humano-bestial     { --hud:#5cba3c;--hud-dim:#0f2a08;--hud-glow:rgba(92,186,60,0.25); }
  body.humano-negativo    { --hud:#9b30ff;--hud-dim:#2a0060;--hud-glow:rgba(155,48,255,0.3); }
  body.humano-positivo    { --hud:#ffe600;--hud-dim:#3a3200;--hud-glow:rgba(255,230,0,0.25); }
  body.humano-perfeito    { --hud:#00f0c8;--hud-dim:#003028;--hud-glow:rgba(0,240,200,0.3); }
  body.humano-infernal    { --hud:#ff2020;--hud-dim:#3d0000;--hud-glow:rgba(255,32,32,0.3); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    transition: --hud 0.4s, --hud-dim 0.4s;
  }

  /* ────────── SCREENS ────────── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ────────── LOGIN ────────── */
  #screen-login {
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #0a1828 0%, var(--bg) 70%);
  }

  .login-box {
    background: var(--panel);
    border: 1px solid var(--hud-dim);
    border-top: 2px solid var(--hud);
    padding: 40px 48px;
    width: 100%;
    max-width: 420px;
    position: relative;
    box-shadow: 0 0 40px var(--hud-glow);
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px;
    height: 1px;
    background: var(--hud);
    box-shadow: 0 0 12px var(--hud);
  }

  .login-logo {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: var(--hud);
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 6px;
    text-shadow: 0 0 20px var(--hud);
  }

  .login-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 36px;
  }

  .login-tabs {
    display: flex;
    border: 1px solid var(--border);
    margin-bottom: 28px;
    overflow: hidden;
  }

  .login-tab {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .login-tab.active {
    background: var(--hud-dim);
    color: var(--hud);
    border-bottom: 2px solid var(--hud);
  }

  .field-group { margin-bottom: 20px; }

  .field-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: #070a0e;
    border: 1px solid var(--border);
    border-bottom: 1px solid var(--hud-dim);
    color: var(--hud);
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    letter-spacing: 6px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: center;
  }

  .field-input:focus {
    border-color: var(--hud);
    box-shadow: 0 0 0 1px var(--hud-dim), 0 0 20px var(--hud-glow);
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--hud);
    color: var(--hud);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--hud);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: 0;
  }

  .btn-primary:hover::before { transform: scaleX(1); }
  .btn-primary:hover { color: var(--bg); }
  .btn-primary span { position: relative; z-index: 1; }

  .login-error {
    color: var(--danger);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    text-align: center;
    margin-top: 14px;
    min-height: 16px;
  }

  /* ────────── MASTER PANEL ────────── */
  #screen-master {
    flex-direction: column;
  }

  .top-bar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .top-bar-logo {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 900;
    color: var(--hud);
    letter-spacing: 3px;
    text-shadow: 0 0 10px var(--hud-glow);
  }

  .top-bar-sep { width: 1px; height: 28px; background: var(--border); }

  .top-bar-role {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .top-bar-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }

  .btn-sm {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-sm:hover { border-color: var(--hud); color: var(--hud); }
  .btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); }
  .btn-sm.accent {
    border-color: var(--hud);
    color: var(--hud);
    background: var(--hud-dim);
  }

  .master-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 52px);
  }

  /* sidebar */
  .sidebar {
    width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); }

  .ficha-item {
    padding: 12px 14px;
    border: 1px solid transparent;
    cursor: pointer;
    margin-bottom: 4px;
    transition: all 0.15s;
    position: relative;
  }

  .ficha-item:hover { border-color: var(--border); background: var(--panel2); }
  .ficha-item.active { border-color: var(--hud-dim); background: var(--panel2); }
  .ficha-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--hud);
  }

  .ficha-item-name {
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 3px;
  }

  .ficha-item-id {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .ficha-item-race {
    display: inline-block;
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    padding: 2px 6px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* main content */
  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
  }

  .main-content::-webkit-scrollbar { width: 4px; }
  .main-content::-webkit-scrollbar-track { background: transparent; }
  .main-content::-webkit-scrollbar-thumb { background: var(--border); }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-dim);
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .empty-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ────────── FICHA EDITOR ────────── */
  .ficha-editor {
    max-width: 820px;
  }

  .ficha-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 16px;
  }

  .ficha-title-block {}

  .ficha-name-display {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    font-weight: 900;
    color: var(--hud);
    text-shadow: 0 0 20px var(--hud-glow);
    margin-bottom: 4px;
  }

  .ficha-id-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 3px;
  }

  .ficha-actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* sections */
  .section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--hud-dim);
    margin-bottom: 16px;
    position: relative;
  }

  .section::before {
    content: '';
    position: absolute;
    top: -2px; left: 0; width: 40px;
    height: 2px;
    background: var(--hud);
  }

  .section-header {
    padding: 12px 18px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--hud);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .section-body { padding: 16px 18px; }

  /* form grid */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 20px;
  }

  .form-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px 20px;
  }

  .form-field {}

  .form-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
  }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: #070a0e;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--hud);
    box-shadow: 0 0 0 1px var(--hud-dim);
  }

  .form-select { cursor: pointer; }
  .form-select option { background: var(--panel); }

  .form-textarea {
    resize: vertical;
    min-height: 72px;
    font-size: 14px;
  }

  /* stats table */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .stat-cell {
    background: #070a0e;
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--hud-dim);
    text-align: center;
    padding: 10px 6px;
    position: relative;
  }

  .stat-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .stat-input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--hud);
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    outline: none;
  }

  .stat-mod {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* tags input */
  .tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    background: #070a0e;
    border: 1px solid var(--border);
    padding: 8px 10px;
    min-height: 42px;
    align-items: center;
  }

  .tag {
    background: var(--hud-dim);
    border: 1px solid var(--hud);
    color: var(--hud);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 1px;
  }

  .tag-remove {
    cursor: pointer;
    color: var(--hud);
    opacity: 0.6;
    font-size: 12px;
    line-height: 1;
  }
  .tag-remove:hover { opacity: 1; }

  .tags-input {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    outline: none;
    flex: 1;
    min-width: 80px;
  }

  /* hibrididade tab */
  .hibri-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }

  .hibri-card {
    border: 1px solid var(--border);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .hibri-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-color, var(--hud));
    transform: scaleX(0);
    transition: transform 0.2s;
  }

  .hibri-card:hover::after, .hibri-card.selected::after { transform: scaleX(1); }

  .hibri-card.selected {
    background: rgba(255,255,255,0.03);
    border-color: var(--card-color, var(--hud));
  }

  .hibri-card-name {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--card-color, var(--text));
  }

  .hibri-card-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .hibri-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--card-color, #666);
    display: inline-block;
    margin-right: 6px;
    box-shadow: 0 0 6px var(--card-color, #666);
  }

  /* ────────── PLAYER VIEW ────────── */
  #screen-player {
    background: var(--bg);
  }

  .player-layout {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .hud-bar {
    background: var(--panel);
    border: 1px solid var(--hud-dim);
    border-top: 3px solid var(--hud);
    padding: 14px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 0 30px var(--hud-glow);
    position: relative;
  }

  .hud-bar::before {
    content: '';
    position: absolute;
    top: -3px; left: 0; width: 60px;
    height: 3px;
    background: var(--hud);
    box-shadow: 0 0 10px var(--hud);
  }

  .hud-name {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    color: var(--hud);
    text-shadow: 0 0 20px var(--hud-glow);
    flex: 1;
  }

  .hud-meta {
    text-align: right;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.8;
    letter-spacing: 1px;
  }

  .hud-vita {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .vita-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    width: 36px;
    flex-shrink: 0;
  }

  .vita-bar {
    flex: 1;
    height: 8px;
    background: var(--panel2);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .vita-fill {
    height: 100%;
    background: var(--hud);
    box-shadow: 0 0 8px var(--hud);
    transition: width 0.4s;
  }

  .vita-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--hud);
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }

  .player-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 2px solid var(--hud-dim);
    margin-bottom: 12px;
    position: relative;
  }

  .player-section::before {
    content: '';
    position: absolute;
    top: -2px; left: 0; width: 30px;
    height: 2px;
    background: var(--hud);
  }

  .player-section-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--hud);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .player-section-body { padding: 14px 16px; }

  /* player stats */
  .player-stats-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .player-stat {
    text-align: center;
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--hud-dim);
    padding: 8px 4px;
    background: #070a0e;
  }

  .player-stat-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .player-stat-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    color: var(--hud);
    font-weight: bold;
    text-shadow: 0 0 10px var(--hud-glow);
  }

  .player-stat-mod {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  /* player attr row */
  .attr-row {
    display: flex;
    justify-content: space-around;
    gap: 10px;
  }

  .attr-block {
    text-align: center;
    flex: 1;
  }

  .attr-val {
    font-family: 'Orbitron', monospace;
    font-size: 24px;
    font-weight: 900;
    color: var(--hud);
    text-shadow: 0 0 16px var(--hud-glow);
  }

  .attr-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .attr-sep {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  /* tags display */
  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag-display {
    background: var(--hud-dim);
    border: 1px solid var(--hud);
    color: var(--hud);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    letter-spacing: 1px;
  }

  /* hibrididade badge */
  .hibri-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--hud-dim);
    border: 1px solid var(--hud);
    padding: 4px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--hud);
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 0 10px var(--hud-glow);
  }

  /* player tabs */
  .player-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    gap: 2px;
    overflow-x: auto;
  }

  .player-tab {
    padding: 10px 18px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .player-tab:hover { color: var(--text); }
  .player-tab.active { color: var(--hud); border-bottom-color: var(--hud); }

  /* master tabs for editor */
  .editor-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    gap: 2px;
  }

  .editor-tab {
    padding: 9px 18px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .editor-tab:hover { color: var(--text); }
  .editor-tab.active { color: var(--hud); border-bottom-color: var(--hud); }

  .editor-pane { display: none; }
  .editor-pane.active { display: block; }

  .player-pane { display: none; }
  .player-pane.active { display: block; }

  /* full width field */
  .form-full { grid-column: 1 / -1; }

  /* modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--hud-dim);
    border-top: 2px solid var(--hud);
    padding: 32px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 0 40px var(--hud-glow);
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--hud);
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

  .btn-cancel {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--text-dim); color: var(--text); }

  .btn-confirm {
    padding: 8px 20px;
    background: var(--hud);
    border: 1px solid var(--hud);
    color: var(--bg);
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn-confirm:hover { opacity: 0.85; }
  .btn-confirm.danger { background: var(--danger); border-color: var(--danger); }

  /* notify */
  .notify {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--panel);
    border: 1px solid var(--hud);
    border-left: 3px solid var(--hud);
    padding: 12px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--hud);
    letter-spacing: 1px;
    box-shadow: 0 0 20px var(--hud-glow);
    z-index: 999;
    transform: translateX(120%);
    transition: transform 0.3s ease;
  }

  .notify.show { transform: translateX(0); }
  .notify.error { border-color: var(--danger); color: var(--danger); }

  /* loading */
  .loading {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--hud-dim);
    border-top-color: var(--hud);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* info row in player view */
  .info-row {
    display: flex;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .info-row:last-child { border-bottom: none; }

  .info-key {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    width: 130px;
    flex-shrink: 0;
  }

  .info-val {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .info-val.accent { color: var(--hud); }

  /* scan line effect */
  .scan-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* responsive */
  @media (max-width: 600px) {
    .stats-grid, .player-stats-grid { grid-template-columns: repeat(4, 1fr); }
    .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* new ficha form */
  .new-ficha-form {
    max-width: 560px;
  }

  /* separator */
  .sep {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .text-dim { color: var(--text-dim); }
  .text-accent { color: var(--hud); }
  .mono { font-family: 'Share Tech Mono', monospace; }

  .inline-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--hud-dim);
    color: var(--hud);
    letter-spacing: 1px;
  }

  .bullet-list {
    list-style: none;
    padding: 0;
  }

  .bullet-list li {
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bullet-list li::before {
    content: '▸';
    color: var(--hud);
    font-size: 10px;
  }

  .bullet-list li:last-child { border-bottom: none; }
</style>
</head>
<body>
<div class="scan-overlay"></div>

<!-- ════════════════════ LOGIN ════════════════════ -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-logo">SISTEMA</div>
    <div class="login-sub">FICHAS // RPG</div>

    <div class="login-tabs">
      <button class="login-tab active" onclick="setLoginTab('master')">MESTRE</button>
      <button class="login-tab" onclick="setLoginTab('player')">PLAYER</button>
    </div>

    <div id="login-master">
      <div class="field-group">
        <label class="field-label">TOKEN DO MESTRE</label>
        <input class="field-input" type="password" id="input-master-token" placeholder="••••••••" maxlength="16">

        <label class="field-label">ID DA FICHA (6 DÍGITOS)</label>

    </div>

    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ════════════════════ MASTER ════════════════════ -->
<div id="screen-master" class="screen">
  <div class="top-bar">
    <div class="top-bar-logo">SISTEMA</div>
    <div class="top-bar-sep"></div>
    <div class="top-bar-role">MESTRE</div>
    <div class="top-bar-right">
      <button class="btn-sm accent" onclick="openNewFicha()">+ NOVA FICHA</button>

  <div class="master-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div style="display:flex;gap:8px">
          <button class="btn-sm accent" id="tab-fichas" onclick="switchMasterTab('fichas')">FICHAS</button>
          <button class="btn-sm" id="tab-excluir" onclick="switchMasterTab('excluir')">EXCLUIR</button>
        </div>
        <span id="ficha-count" class="inline-badge">0</span>
      </div>
      <div class="sidebar-list" id="sidebar-list">
        <div style="padding:20px;text-align:center" class="text-dim mono" style="font-size:11px">carregando...</div>
      </div>
      <div class="sidebar-list" id="excluir-list" style="display:none"></div>
    </div>

    <div class="main-content" id="main-content">
      <div class="empty-state">
        <div class="empty-icon">⬡</div>
        <div class="empty-text">Selecione ou crie uma ficha</div>
      </div>

  </div>
</div>

<!-- ════════════════════ PLAYER ════════════════════ -->
<div id="screen-player" class="screen">
  <div class="player-layout">
    <div class="top-bar" style="position:relative;margin-bottom:20px;border-radius:0">
      <div class="top-bar-logo">FICHA</div>
      <div class="top-bar-sep"></div>
      <div class="top-bar-role" id="player-id-label">ID: ------</div>
      <div class="top-bar-right">

</div>

<!-- ════════════════════ MODAL: NOVA FICHA ════════════════════ -->
<div class="modal-overlay" id="modal-new">
  <div class="modal">
    <div class="modal-title">CRIAR NOVA FICHA</div>
    <div class="new-ficha-form">

<!-- ════════════════════ MODAL: CONFIRMAR DELETE ════════════════════ -->

    <p style="color:var(--text-dim);font-size:14px;line-height:1.6">Esta ação não pode ser desfeita. A ficha e todos os seus dados serão permanentemente excluídos.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-delete')">CANCELAR</button>
      <button class="btn-confirm danger" onclick="confirmDelete()">EXCLUIR</button>
    </div>

</div>

<!-- Notification -->
<div class="notify" id="notify"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const MASTER_TOKEN = 'mA1B2C3D4';
const API = '/.netlify/functions/ficha';

const HIBRICIDADES = {
  'humano-comum':    { nome:'Humano Comum',               cor:'#c0c8d0', desc:'O ser humano em sua forma base, sem modificações.' },
  'humano-meca':     { nome:'Humano Meca',                cor:'#ff7a00', desc:'Fusão de tecidos orgânicos com componentes mecânicos.' },
  'humano-bestial':  { nome:'Humano Bestial',             cor:'#5cba3c', desc:'Traços animalescos integrados à forma humana.' },
  'humano-negativo': { nome:'Humano c/ Energia Negativa', cor:'#9b30ff', desc:'Correntes de energia sombria permeando o corpo.' },
  'humano-positivo': { nome:'Humano c/ Energia Positiva', cor:'#ffe600', desc:'Luz radiante e energia vital amplificada.' },
  'humano-perfeito': { nome:'Humano Perfeito',            cor:'#00f0c8', desc:'O ápice da evolução humana, corpo e mente em harmonia.' },
  'humano-infernal': { nome:'Humano Infernal',            cor:'#ff2020', desc:'Marcado pelo fogo e pela vontade do abismo.' },
};

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let currentRole = null;       // 'master' | 'player'
let currentFichaId = null;
let fichas = [];
let pendingDeleteId = null;
let autoSaveTimer = null;

// ═══════════════════════════════════════════════
//  SCREEN HELPERS
// ═══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function applyHibriTheme(hibri) {
  const validClasses = Object.keys(HIBRICIDADES);
  document.body.classList.remove(...validClasses);
  if (hibri && validClasses.includes(hibri)) {
    document.body.classList.add(hibri);
  }
}

// ═══════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════
let loginTab = 'master';

function setLoginTab(tab) {
  loginTab = tab;
  document.getElementById('login-master').style.display = tab === 'master' ? 'block' : 'none';
  document.getElementById('login-player').style.display = tab === 'player' ? 'block' : 'none';
  document.querySelectorAll('.login-tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'master') || (i === 1 && tab === 'player'));
  });
  document.getElementById('login-error').textContent = '';
}

async function loginMaster() {
  const token = document.getElementById('input-master-token').value;
  if (token !== MASTER_TOKEN) {
    document.getElementById('login-error').textContent = '⚠ Token inválido';
    return;
  }
  currentRole = 'master';
  showScreen('master');
  await loadAllFichas();
}

async function loginPlayer() {
  const id = document.getElementById('input-player-id').value.trim();
  if (id.length !== 6) {
    document.getElementById('login-error').textContent = '⚠ ID deve ter 6 dígitos';
    return;
  }
  document.getElementById('login-error').textContent = '';

  try {
    const data = await apiFetch(`${API}/${id}`, 'GET');
    currentRole = 'player';
    currentFichaId = id;
    applyHibriTheme(data.hibricidade);
    document.getElementById('player-id-label').textContent = `ID: ${id}`;
    renderPlayerView(data);
    showScreen('player');
  } catch (e) {
    document.getElementById('login-error').textContent = '⚠ Ficha não encontrada';
  }
}

function logout() {
  currentRole = null;
  currentFichaId = null;
  fichas = [];
  applyHibriTheme(null);
  document.getElementById('input-master-token').value = '';
  document.getElementById('input-player-id').value = '';
  document.getElementById('login-error').textContent = '';
  showScreen('login');
}

// ═══════════════════════════════════════════════
//  API HELPERS
// ═══════════════════════════════════════════════
async function apiFetch(url, method, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ═══════════════════════════════════════════════
//  MASTER: LOAD FICHAS
// ═══════════════════════════════════════════════
async function loadAllFichas() {
  try {
    fichas = await apiFetch(API, 'GET');
    renderSidebar();
  } catch (e) {
    notify('Erro ao carregar fichas: ' + e.message, true);
  }
}

function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  document.getElementById('ficha-count').textContent = fichas.length;

  if (fichas.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;font-family:\'Share Tech Mono\',monospace;font-size:11px;color:var(--text-dim)">Nenhuma ficha</div>';
    return;
  }

  list.innerHTML = fichas.map(f => {
    const hibri = HIBRICIDADES[f.hibricidade] || HIBRICIDADES['humano-comum'];
    const isActive = f.id === currentFichaId;
    return `
      <div class="ficha-item ${isActive ? 'active' : ''}" onclick="selectFicha('${f.id}')">
        <div class="ficha-item-name">${f.nome || '(sem nome)'}</div>
        <div class="ficha-item-id">ID: ${f.id}</div>
        <div class="ficha-item-race">
          <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${hibri.cor};margin-right:5px;box-shadow:0 0 5px ${hibri.cor}"></span>
          ${hibri.nome}
        </div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
//  MASTER: SELECT / EDITOR
// ═══════════════════════════════════════════════
async function selectFicha(id) {
  currentFichaId = id;
  renderSidebar();

  try {
    const data = await apiFetch(`${API}/${id}`, 'GET');
    applyHibriTheme(data.hibricidade);
    renderEditor(data);
  } catch (e) {
    notify('Erro ao carregar ficha', true);
  }
}

function renderEditor(f) {
  const hibri = HIBRICIDADES[f.hibricidade] || HIBRICIDADES['humano-comum'];
  const mc = document.getElementById('main-content');

  mc.innerHTML = `
    <div class="ficha-editor">
      <div class="ficha-header">
        <div class="ficha-title-block">
          <div class="ficha-name-display">${f.nome || '(sem nome)'}</div>
          <div class="ficha-id-display">ID: ${f.id} &nbsp;|&nbsp; ${hibri.nome}</div>
        </div>
        <div class="ficha-actions">
          <button class="btn-sm" onclick="copyId('${f.id}')">COPIAR ID</button>
          <button class="btn-sm" onclick="saveFicha()">SALVAR</button>
          <button class="btn-sm danger" onclick="deleteFicha('${f.id}')">EXCLUIR</button>
        </div>
      </div>

      <div class="editor-tabs">
        <button class="editor-tab active" onclick="switchEditorTab('basico', this)">BÁSICO</button>
        <button class="editor-tab" onclick="switchEditorTab('atributos', this)">ATRIBUTOS</button>
        <button class="editor-tab" onclick="switchEditorTab('estatisticas', this)">ESTATÍSTICAS</button>
        <button class="editor-tab" onclick="switchEditorTab('habilidades', this)">HABILIDADES</button>
        <button class="editor-tab" onclick="switchEditorTab('hibricidade', this)">HIBRICIDADE</button>
      </div>

      <!-- BÁSICO -->
      <div class="editor-pane active" id="pane-basico">
        <div class="section">
          <div class="section-header"><span class="section-title">INFORMAÇÕES BÁSICAS</span></div>
          <div class="section-body">
            <div class="form-grid">
              <div class="form-field">
                <label class="form-label">NOME</label>
                <input class="form-input" id="ed-nome" value="${esc(f.nome)}">
              </div>
              <div class="form-field">
                <label class="form-label">ALINHAMENTO</label>
                <input class="form-input" id="ed-alinhamento" value="${esc(f.alinhamento)}">
              </div>
              <div class="form-field">
                <label class="form-label">CLASSE</label>
                <input class="form-input" id="ed-classe" value="${esc(f.classe)}">
              </div>
              <div class="form-field">
                <label class="form-label">ANTECEDENTE</label>
                <input class="form-input" id="ed-antecedente" value="${esc(f.antecedente)}">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ATRIBUTOS -->
      <div class="editor-pane" id="pane-atributos">
        <div class="section">
          <div class="section-header"><span class="section-title">ATRIBUTOS</span></div>
          <div class="section-body">
            <div class="form-grid-3">
              <div class="form-field">
                <label class="form-label">NÍVEL</label>
                <input class="form-input" id="ed-nivel" type="number" value="${f.nivel||0}" min="0">
              </div>
              <div class="form-field">
                <label class="form-label">HB (Habilidade Base)</label>
                <input class="form-input" id="ed-hb" type="number" value="${f.hb||13}" min="1">
              </div>
              <div class="form-field">
                <label class="form-label">NEN</label>
                <input class="form-input" id="ed-nen" type="number" value="${f.nen||2}" min="0">
              </div>
              <div class="form-field">
                <label class="form-label">VIDA (atual)</label>
                <input class="form-input" id="ed-vida" type="number" value="${f.vida||0}">
              </div>
              <div class="form-field">
                <label class="form-label">VIDA (máxima)</label>
                <input class="form-input" id="ed-vida-max" type="number" value="${f.vidaMax||0}">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ESTATÍSTICAS -->
      <div class="editor-pane" id="pane-estatisticas">
        <div class="section">
          <div class="section-header"><span class="section-title">ESTATÍSTICAS</span></div>
          <div class="section-body">
            <div class="stats-grid">
              ${['FOR','DES','CON','SAB','INT','CAR','NEN'].map(s => `
                <div class="stat-cell">
                  <div class="stat-label">${s}</div>
                  <input class="stat-input" id="ed-stat-${s}" type="number" value="${f.stats?.[s]||1}" min="1" max="30" oninput="updateMod('${s}')">
                  <div class="stat-mod" id="mod-${s}">${calcMod(f.stats?.[s]||1)}</div>
                </div>`).join('')}
            </div>
          </div>
        </div>
      </div>

      <!-- HABILIDADES -->

function esc(v) { return (v||'').toString().replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function calcMod(val) {
  const v = parseInt(val)||1;
  const mod = Math.floor((v - 10) / 2);
  return (mod >= 0 ? '+' : '') + mod;
}

function updateMod(stat) {
  const inp = document.getElementById(`ed-stat-${stat}`);
  const mod = document.getElementById(`mod-${stat}`);
  if (inp && mod) mod.textContent = calcMod(inp.value);
}

function renderTags(arr, type) {
  return (arr||[]).map(t =>
    `<span class="tag">${esc(t)}<span class="tag-remove" onclick="removeTag(this,'${type}')">✕</span></span>`
  ).join('');
}

function addTag(e, type) {
  if (e.key !== 'Enter') return;
  const inp = e.target;
  const val = inp.value.trim();
  if (!val) return;
  const container = document.getElementById(`tags-${type}`);
  const span = document.createElement('span');
  span.className = 'tag';
  span.innerHTML = `${esc(val)}<span class="tag-remove" onclick="removeTag(this,'${type}')">✕</span>`;
  container.insertBefore(span, inp);
  inp.value = '';
}

function removeTag(btn, type) {
  btn.parentElement.remove();
}

function getTags(type) {
  const container = document.getElementById(`tags-${type}`);
  if (!container) return [];
  return [...container.querySelectorAll('.tag')].map(t => t.textContent.replace('✕','').trim());
}

function selectHibri(key) {
  document.querySelectorAll('.hibri-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.hibri-card[onclick*="${key}"]`).classList.add('selected');
  applyHibriTheme(key);
  renderSidebar();
}

function getSelectedHibri() {
  const sel = document.querySelector('.hibri-card.selected');
  if (!sel) return 'humano-comum';
  const onclick = sel.getAttribute('onclick');
  const m = onclick.match(/'([^']+)'/);
  return m ? m[1] : 'humano-comum';
}

function switchEditorTab(name, btn) {
  document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.editor-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`pane-${name}`).classList.add('active');
}

async function saveFicha() {
  if (!currentFichaId) return;

  const payload = {
    nome:           document.getElementById('ed-nome')?.value || '',
    alinhamento:    document.getElementById('ed-alinhamento')?.value || '',
    classe:         document.getElementById('ed-classe')?.value || '',
    antecedente:    document.getElementById('ed-antecedente')?.value || '',
    nivel:          parseInt(document.getElementById('ed-nivel')?.value)||0,
    hb:             parseInt(document.getElementById('ed-hb')?.value)||13,
    nen:            parseInt(document.getElementById('ed-nen')?.value)||2,
    vida:           parseInt(document.getElementById('ed-vida')?.value)||0,
    vidaMax:        parseInt(document.getElementById('ed-vida-max')?.value)||0,
    notas:          document.getElementById('ed-notas')?.value || '',
    hibricidade:    getSelectedHibri(),
    proeminencia:   getTags('proeminencia'),
    caracteristicas:getTags('caracteristicas'),
    pericias:       getTags('pericias'),
    stats: {
      FOR: parseInt(document.getElementById('ed-stat-FOR')?.value)||1,
      DES: parseInt(document.getElementById('ed-stat-DES')?.value)||1,
      CON: parseInt(document.getElementById('ed-stat-CON')?.value)||1,
      SAB: parseInt(document.getElementById('ed-stat-SAB')?.value)||1,
      INT: parseInt(document.getElementById('ed-stat-INT')?.value)||1,
      CAR: parseInt(document.getElementById('ed-stat-CAR')?.value)||1,
      NEN: parseInt(document.getElementById('ed-stat-NEN')?.value)||1,
    },
  };

  try {
    const updated = await apiFetch(`${API}/${currentFichaId}`, 'PUT', payload);
    // update local list
    const idx = fichas.findIndex(f => f.id === currentFichaId);
    if (idx >= 0) fichas[idx] = { ...fichas[idx], ...updated };
    renderSidebar();
    notify('Ficha salva com sucesso!');
  } catch (e) {
    notify('Erro ao salvar: ' + e.message, true);
  }
}

function copyId(id) {
  navigator.clipboard.writeText(id).then(() => notify('ID copiado: ' + id));
}

function deleteFicha(id) {
  pendingDeleteId = id;
  document.getElementById('modal-delete').classList.add('open');
}

async function confirmDelete() {
  if (!pendingDeleteId) return;
  try {
    await apiFetch(`${API}/${pendingDeleteId}`, 'DELETE');
    fichas = fichas.filter(f => f.id !== pendingDeleteId);
    pendingDeleteId = null;
    currentFichaId = null;
    applyHibriTheme(null);
    renderSidebar();
    document.getElementById('main-content').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⬡</div>
        <div class="empty-text">Ficha excluída</div>
      </div>`;
    closeModal('modal-delete');
    notify('Ficha excluída');
  } catch (e) {
    notify('Erro ao excluir: ' + e.message, true);
  }
}

function openNewFicha() {
  document.getElementById('new-nome').value = '';
  document.getElementById('new-alinhamento').value = '';
  document.getElementById('new-hibri').value = 'humano-comum';
  document.getElementById('modal-new').classList.add('open');
}

async function createFicha() {
  const nome = document.getElementById('new-nome').value.trim();
  if (!nome) { notify('Informe o nome do personagem', true); return; }

  const payload = {
    nome,
    alinhamento: document.getElementById('new-alinhamento').value,
    hibricidade: document.getElementById('new-hibri').value,
    classe: '',
    antecedente: '',
    nivel: 0,
    hb: 13,
    nen: 2,
    vida: 0,
    vidaMax: 0,
    notas: '',
    proeminencia: [],
    caracteristicas: [],
    pericias: [],
    stats: { FOR:1, DES:1, CON:1, SAB:1, INT:1, CAR:1, NEN:1 },
  };

  try {
    const created = await apiFetch(API, 'POST', payload);
    fichas.push(created);
    closeModal('modal-new');
    renderSidebar();
    await selectFicha(created.id);
    notify(`Ficha criada! ID: ${created.id}`);
  } catch (e) {
    notify('Erro ao criar ficha: ' + e.message, true);
  }
}

function switchMasterTab(tab) {
  const fichasList = document.getElementById('sidebar-list');
  const excluirList = document.getElementById('excluir-list');
  const tabFichas = document.getElementById('tab-fichas');
  const tabExcluir = document.getElementById('tab-excluir');

  if (tab === 'fichas') {
    fichasList.style.display = 'block';
    excluirList.style.display = 'none';
    tabFichas.classList.add('accent');
    tabExcluir.classList.remove('accent');

    fichasList.style.display = 'none';
    excluirList.style.display = 'block';
    tabFichas.classList.remove('accent');
    tabExcluir.classList.add('accent');
    renderExcluirList();
  }
}

    list.innerHTML = '<div style="padding:20px;text-align:center;font-family:\'Share Tech Mono\',monospace;font-size:11px;color:var(--text-dim)">Nenhuma ficha</div>';
    return;
  }
  list.innerHTML = fichas.map(f => {
    const hibri = HIBRICIDADES[f.hibricidade] || HIBRICIDADES['humano-comum'];
    return `
      <div class="ficha-item" style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div class="ficha-item-name">${f.nome || '(sem nome)'}</div>
          <div class="ficha-item-id">ID: ${f.id}</div>
        </div>
        <button class="btn-sm danger" onclick="deleteFicha('${f.id}')" style="flex-shrink:0">EXCLUIR</button>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
//  PLAYER EDIT & SAVE
// ═══════════════════════════════════════════════
function selectPlayerHibri(key) {
  document.querySelectorAll('#player-hibri-selector .hibri-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`#player-hibri-selector .hibri-card[onclick*="${key}"]`);
  if (card) card.classList.add('selected');
  applyHibriTheme(key);
}

function getSelectedPlayerHibri() {
  const sel = document.querySelector('#player-hibri-selector .hibri-card.selected');
  if (!sel) return 'humano-comum';
  const m = sel.getAttribute('onclick').match(/'([^']+)'/);
  return m ? m[1] : 'humano-comum';
}

function getPlayerTags(type) {
  const container = document.getElementById(`ptags-${type.replace('p-','')}`);
  if (!container) return [];
  return [...container.querySelectorAll('.tag')].map(t => t.textContent.replace('✕','').trim());
}

async function savePlayerFicha() {
  if (!currentFichaId) return;

  const payload = {
    nome:            document.getElementById('ped-nome')?.value || '',
    alinhamento:     document.getElementById('ped-alinhamento')?.value || '',
    classe:          document.getElementById('ped-classe')?.value || '',
    antecedente:     document.getElementById('ped-antecedente')?.value || '',
    nivel:           parseInt(document.getElementById('ped-nivel')?.value)||0,
    hb:              parseInt(document.getElementById('ped-hb')?.value)||13,
    nen:             parseInt(document.getElementById('ped-nen')?.value)||2,
    vida:            parseInt(document.getElementById('ped-vida')?.value)||0,
    vidaMax:         parseInt(document.getElementById('ped-vida-max')?.value)||0,
    notas:           document.getElementById('ped-notas')?.value || '',
    hibricidade:     getSelectedPlayerHibri(),
    proeminencia:    getPlayerTags('p-proeminencia'),
    caracteristicas: getPlayerTags('p-caracteristicas'),
    pericias:        getPlayerTags('p-pericias'),
    stats: {
      FOR: parseInt(document.getElementById('ped-stat-FOR')?.value)||1,
      DES: parseInt(document.getElementById('ped-stat-DES')?.value)||1,
      CON: parseInt(document.getElementById('ped-stat-CON')?.value)||1,
      SAB: parseInt(document.getElementById('ped-stat-SAB')?.value)||1,
      INT: parseInt(document.getElementById('ped-stat-INT')?.value)||1,
      CAR: parseInt(document.getElementById('ped-stat-CAR')?.value)||1,
      NEN: parseInt(document.getElementById('ped-stat-NEN')?.value)||1,
    },
  };

  try {
    await apiFetch(`${API}/${currentFichaId}`, 'PUT', payload);
    notify('Ficha salva com sucesso!');
    applyHibriTheme(payload.hibricidade);
  } catch (e) {
    notify('Erro ao salvar: ' + e.message, true);
  }
}

// ═══════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's' && currentRole === 'master' && currentFichaId) {
    e.preventDefault();
    saveFicha();
  }
});
</script>
